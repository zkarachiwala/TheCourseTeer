<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body { font-family: 'Open Sans', sans-serif; min-height: 100vh; }

  /* Theme vars */
  .theme-dark {
    --bg: oklch(10% 0.012 270);
    --bg2: oklch(14% 0.012 270);
    --bg3: oklch(18% 0.012 270);
    --border: oklch(25% 0.012 270);
    --text: oklch(98% 0 0);
    --text2: oklch(72% 0.006 270);
    --text3: oklch(52% 0.008 270);
    --accent: oklch(85% 0.22 135);
    --accent-fg: oklch(12% 0.05 135);
    --accent-soft: oklch(85% 0.22 135 / 0.12);
    --card-bg: oklch(16% 0.012 270);
    --card-hover: oklch(20% 0.014 270);
    --pill-bg: oklch(20% 0.012 270);
    --pill-active: oklch(85% 0.22 135);
    --pill-active-text: oklch(12% 0.05 135);
    --shadow: 0 4px 24px oklch(0% 0 0 / 0.4);
    --shadow-lg: 0 12px 48px oklch(0% 0 0 / 0.6);
    --hero-gradient: linear-gradient(160deg, oklch(12% 0.02 270) 0%, oklch(8% 0.015 290) 100%);
  }
  .theme-light {
    --bg: oklch(98% 0.006 90);
    --bg2: oklch(95% 0.008 90);
    --bg3: oklch(92% 0.008 90);
    --border: oklch(88% 0.008 90);
    --text: oklch(12% 0.01 270);
    --text2: oklch(45% 0.01 270);
    --text3: oklch(65% 0.01 270);
    --accent: oklch(58% 0.22 25);
    --accent-fg: oklch(98% 0.005 90);
    --accent-soft: oklch(58% 0.22 25 / 0.1);
    --card-bg: oklch(100% 0 0);
    --card-hover: oklch(98% 0.006 90);
    --pill-bg: oklch(92% 0.008 90);
    --pill-active: oklch(58% 0.22 25);
    --pill-active-text: oklch(98% 0.005 90);
    --shadow: 0 2px 16px oklch(12% 0.01 270 / 0.08);
    --shadow-lg: 0 8px 40px oklch(12% 0.01 270 / 0.15);
    --hero-gradient: linear-gradient(160deg, oklch(97% 0.008 90) 0%, oklch(94% 0.012 60) 100%);
  }

  body { background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Animations */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(32px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideInPanel { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes shimmer { from { background-position: -200% center; } to { background-position: 200% center; } }
  @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
</style>
</head>
<body>

  { name: "Bachelor of Business (Marketing)", uni: "rmit", atar: 68, dur: 3, campus: "City", area: "Business", desc: "Creative and strategic marketing education grounded in real-world industry projects and practicums." },
  { name: "Bachelor of Architecture", uni: "rmit", atar: 80, dur: 3, campus: "City", area: "Design", desc: "Internationally acclaimed architecture program known for experimental design and urban thinking." },

  { name: "Bachelor of Engineering (Professional)", uni: "swi", atar: 78, dur: 4, campus: "Hawthorn", area: "Engineering", desc: "Industry-embedded degree with work-integrated learning. Guaranteed industry placements with 250+ partner companies." },
  { name: "Bachelor of Computer Science", uni: "swi", atar: 72, dur: 3, campus: "Hawthorn", area: "Technology", desc: "Deeply practical CS degree. Build real products from day one, with studios replacing traditional lectures." },
  { name: "Bachelor of Design", uni: "swi", atar: 68, dur: 3, campus: "Hawthorn", area: "Design", desc: "Studio-based learning with strong industry connections. Specialise in interaction, industrial or communication design." },
  { name: "Bachelor of Arts and Sciences", uni: "swi", atar: 70, dur: 3, campus: "Hawthorn", area: "Arts", desc: "A unique interdisciplinary degree combining humanities and STEM thinking for the modern world." },

  { name: "Bachelor of Business", uni: "vu", atar: 55, dur: 3, campus: "Footscray City", area: "Business", desc: "VU's pioneering block model means you study one unit at a time — less stress, better outcomes." },
  { name: "Bachelor of Information Technology", uni: "vu", atar: 50, dur: 3, campus: "Footscray City", area: "Technology", desc: "Hands-on IT education with VU Block Model. Specialisations in networking, cloud and data analytics." },
  { name: "Bachelor of Sport and Recreation Management", uni: "vu", atar: 52, dur: 3, campus: "Footscray Park", area: "Sport", desc: "Work with elite sporting clubs and community organisations. Melbourne's sports capital advantage." },

const FEATURED_UNI = {
  id: "mon",
  name: "Monash University",
  short: "Monash",
  color: "#006DAE",
  tagline: "Australia's most internationally connected university",
  highlight: "Over 100 courses · Ranked top 50 worldwide · 75,000+ students",
  cta: "Explore all Monash courses",
};

const COURSES = COURSES_RAW.map((c, i) => ({
  ...c,
  id: i,
  uniName: UNIS.find(u => u.id === c.uni)?.name ?? "",
  uniShort: UNIS.find(u => u.id === c.uni)?.short ?? "",
  uniColor: UNIS.find(u => u.id === c.uni)?.color ?? "#666",
  sponsored: c.sponsored ?? false,
}));

const AREAS = [...new Set(COURSES.map(c => c.area))].sort();
const ALL_CAMPUSES = [...new Set(COURSES.map(c => c.campus))].sort();

const HERO_WORDS = ["Engineering", "Medicine", "Law", "Design", "Business", "Science", "Arts", "Nursing", "Teaching", "Technology"];

// ─── Theme vars injected into body ──────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "layout": "grid",
  "accentHue": "lime"
}/*EDITMODE-END*/;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function atarColor(atar) {
  if (!atar) return "var(--text3)";
  if (atar >= 95) return "#ef4444";
  if (atar >= 85) return "#f97316";
  if (atar >= 75) return "#eab308";
  return "#22c55e";
}

function AreaBadge({ area }) {
  const colors = {
    Science: "#6366f1", Business: "#0ea5e9", Engineering: "#f97316",
    Technology: "#8b5cf6", Design: "#ec4899", Arts: "#14b8a6",
    Medicine: "#ef4444", Law: "#a16207", Health: "#22c55e",
    Education: "#06b6d4", Sport: "#84cc16",
  };
  return (
    <span style={{
      display: "inline-block", padding: "2px 8px", borderRadius: 99,
      fontSize: 11, fontWeight: 600, letterSpacing: "0.03em",
      background: (colors[area] ?? "#666") + "22",
      color: colors[area] ?? "#666",
    }}>{area}</span>
  );
}

// ─── Hero cycling text ───────────────────────────────────────────────────────
function CyclingWord() {
  const [idx, setIdx] = useState(0);
  const [fading, setFading] = useState(false);
  useEffect(() => {
    const t = setInterval(() => {
      setFading(true);
      setTimeout(() => { setIdx(i => (i + 1) % HERO_WORDS.length); setFading(false); }, 300);
    }, 2000);
    return () => clearInterval(t);
  }, []);
  return (
    <span style={{
      display: "inline-block", minWidth: 280,
      color: "var(--accent)",
      opacity: fading ? 0 : 1,
      transform: fading ? "translateY(-8px)" : "translateY(0)",
      transition: "opacity 0.3s, transform 0.3s",
      fontStyle: "normal",
    }}>{HERO_WORDS[idx]}</span>
  );
}

// ─── Course Detail Panel ─────────────────────────────────────────────────────
function DetailPanel({ course, onClose, shortlisted, onShortlist }) {
  useEffect(() => {
    const handler = e => e.key === "Escape" && onClose();
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [onClose]);

  if (!course) return null;
  return (
    <>
      <div onClick={onClose} style={{
        position: "fixed", inset: 0, background: "oklch(0% 0 0 / 0.5)",
        zIndex: 100, animation: "fadeIn 0.2s ease",
        backdropFilter: "blur(4px)",
      }} />
      <div style={{
        position: "fixed", top: 0, right: 0, bottom: 0,
        width: "min(480px, 100vw)", background: "var(--bg2)",
        borderLeft: "1px solid var(--border)", zIndex: 101,
        animation: "slideInPanel 0.3s cubic-bezier(0.16,1,0.3,1)",
        display: "flex", flexDirection: "column", overflow: "hidden",
      }}>
        {/* Header */}
        <div style={{ padding: "24px 28px 20px", borderBottom: "1px solid var(--border)", position: "relative" }}>
          <button onClick={onClose} style={{
            position: "absolute", top: 20, right: 20,
            background: "var(--bg3)", border: "none", cursor: "pointer",
            width: 32, height: 32, borderRadius: "50%",
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "var(--text2)", fontSize: 18, lineHeight: 1,
            transition: "background 0.2s",
          }} onMouseEnter={e => e.target.style.background = "var(--border)"}
             onMouseLeave={e => e.target.style.background = "var(--bg3)"}>
            ×
          </button>
          <div style={{ marginBottom: 8 }}><AreaBadge area={course.area} /></div>
          <h2 style={{ fontFamily: "'Manrope', sans-serif", fontSize: 26, lineHeight: 1.25, marginBottom: 6, paddingRight: 40 }}>
            {course.name}
          </h2>
          <div style={{ fontSize: 14, color: "var(--text2)", fontWeight: 500 }}>{course.uniName}</div>
        </div>
        {/* Body */}
        <div style={{ flex: 1, overflowY: "auto", padding: "24px 28px" }}>
          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 28 }}>
            {[
              { label: "ATAR", value: course.atar ?? "–", sub: "guaranteed entry", color: course.atar ? atarColor(course.atar) : "var(--text2)" },
              { label: "Duration", value: `${course.dur}y`, sub: "full-time", color: "var(--accent)" },
              { label: "Campus", value: course.campus, sub: course.uniShort, color: "var(--text)" },
            ].map(s => (
              <div key={s.label} style={{
                background: "var(--bg3)", borderRadius: 12, padding: "14px 16px",
                border: "1px solid var(--border)",
              }}>
                <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.06em" }}>{s.label}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: s.color, lineHeight: 1.2 }}>{s.value}</div>
                <div style={{ fontSize: 10, color: "var(--text3)", marginTop: 2 }}>{s.sub}</div>
              </div>
            ))}
          </div>
          {/* Description */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--text3)", marginBottom: 10, fontWeight: 600 }}>About this course</div>
            <p style={{ fontSize: 15, lineHeight: 1.7, color: "var(--text2)" }}>{course.desc}</p>
          </div>
          {/* Uni strip */}
          <div style={{
            background: "var(--bg3)", border: "1px solid var(--border)",
            borderRadius: 12, padding: "16px 20px",
            display: "flex", alignItems: "center", gap: 14,
          }}>
            <div style={{
              width: 44, height: 44, borderRadius: 10,
              background: course.uniColor + "22",
              border: `2px solid ${course.uniColor}44`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 13, fontWeight: 800, color: course.uniColor,
            }}>{course.uniShort.slice(0, 2).toUpperCase()}</div>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 2 }}>{course.uniName}</div>
              <div style={{ fontSize: 12, color: "var(--text3)" }}>{course.campus} Campus</div>
            </div>
          </div>
        </div>
        {/* Footer CTA */}
        <div style={{ padding: "20px 28px", borderTop: "1px solid var(--border)" }}>
          <a href="#" style={{
            display: "block", width: "100%", textAlign: "center",
            background: "var(--accent)", color: "var(--accent-fg)",
            padding: "13px 0", borderRadius: 10, fontWeight: 600, fontSize: 15,
            textDecoration: "none", transition: "opacity 0.2s",
          }}
          onMouseEnter={e => e.currentTarget.style.opacity = "0.85"}
          onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
            View on university website →
          </a>
          <button onClick={() => onShortlist(course)} style={{
            display: "block", width: "100%", marginTop: 10,
            background: shortlisted ? "var(--accent-soft)" : "transparent",
            border: `1px solid ${shortlisted ? "var(--accent)" : "var(--border)"}`,
            color: shortlisted ? "var(--accent)" : "var(--text2)",
            padding: "11px 0", borderRadius: 10,
            fontWeight: 500, fontSize: 14, cursor: "pointer", transition: "all 0.2s",
          }}>
            {shortlisted ? "✓ Saved to shortlist" : "Save to shortlist"}
          </button>
        </div>
      </div>
    </>
  );
}

// ─── Course Card (Grid layout) ───────────────────────────────────────────────
function CourseCard({ course, onClick, idx, shortlisted, onShortlist }) {
  const [hov, setHov] = useState(false);
  return (
    <div
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: hov ? "var(--card-hover)" : "var(--card-bg)",
        border: `1px solid ${hov ? "var(--accent)" : course.sponsored ? "oklch(85% 0.22 135 / 0.35)" : "var(--border)"}`,
        borderRadius: 16, padding: "22px 22px 16px",
        cursor: "pointer", transition: "all 0.2s cubic-bezier(0.34,1.56,0.64,1)",
        transform: hov ? "translateY(-3px) scale(1.01)" : "translateY(0) scale(1)",
        boxShadow: hov ? "var(--shadow-lg)" : course.sponsored ? "0 0 0 1px oklch(85% 0.22 135 / 0.1)" : "none",
        animation: `fadeUp 0.4s ${idx * 0.04}s both ease`,
        display: "flex", flexDirection: "column", gap: 10,
        position: "relative", overflow: "hidden",
      }}>
      {course.sponsored && (
        <div style={{ position: "absolute", top: 0, right: 0, background: "var(--accent)", color: "var(--accent-fg)", fontSize: 9, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", padding: "3px 10px", borderBottomLeftRadius: 8 }}>Sponsored</div>
      )}
      <div onClick={() => onClick(course)} style={{ display: "flex", flexDirection: "column", gap: 10, flex: 1 }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
          <AreaBadge area={course.area} />
          {course.atar && (
            <span style={{ fontSize: 12, fontWeight: 700, color: atarColor(course.atar) }}>
              ATAR {course.atar}
            </span>
          )}
        </div>
        <h3 style={{ fontFamily: "'Manrope', sans-serif", fontSize: 18, lineHeight: 1.3, flex: 1, fontWeight: 700 }}>
          {course.name}
        </h3>
        <div style={{ fontSize: 13, color: "var(--text2)", fontWeight: 500 }}>{course.uniShort}</div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: 10, borderTop: "1px solid var(--border)" }}>
          <span style={{ fontSize: 12, color: "var(--text3)" }}>📍 {course.campus}</span>
          <span style={{ fontSize: 12, color: "var(--text3)" }}>{course.dur} yr{course.dur > 1 ? "s" : ""}</span>
        </div>
      </div>
      <button onClick={e => { e.stopPropagation(); onShortlist(course); }} style={{
        background: shortlisted ? "var(--accent-soft)" : "var(--bg3)",
        border: `1px solid ${shortlisted ? "var(--accent)" : "var(--border)"}`,
        color: shortlisted ? "var(--accent)" : "var(--text3)",
        borderRadius: 8, padding: "7px 0", fontSize: 12, fontWeight: 600,
        cursor: "pointer", transition: "all 0.2s", width: "100%", marginTop: 4,
      }}>{shortlisted ? "✓ Shortlisted" : "+ Shortlist"}</button>
    </div>
  );
}

// ─── Course Row (List layout) ────────────────────────────────────────────────
function CourseRow({ course, onClick, idx }) {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={() => onClick(course)}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}

    <>

        display: "flex", flexDirection: "column",

            <div style={{ fontSize: 13, color: "var(--text3)", marginTop: 2 }}>{items.length} course{items.length !== 1 ? "s" : ""} saved</div>
          </div>
          <button onClick={onClose} style={{ background: "var(--bg3)", border: "none", cursor: "pointer", width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text2)", fontSize: 18 }}>×</button>
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "16px 28px" }}>
          {items.length === 0 && (
            <div style={{ textAlign: "center", padding: "48px 0", color: "var(--text3)" }}>
              <div style={{ fontSize: 36, marginBottom: 12 }}>📋</div>
              <div style={{ fontSize: 15 }}>No courses saved yet</div>
              <div style={{ fontSize: 13, marginTop: 6 }}>Click "Save to shortlist" on any course</div>
            </div>
          )}
          {items.map((c, i) => (
            <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: "1px solid var(--border)", animation: `fadeUp 0.3s ${i * 0.04}s both` }}>
              <div style={{ width: 36, height: 36, borderRadius: 8, flexShrink: 0, background: c.uniColor + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: c.uniColor }}>{c.uniShort.slice(0,2)}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.name}</div>
                <div style={{ fontSize: 12, color: "var(--text3)" }}>{c.uniShort} · {c.campus}</div>
              </div>
              <button onClick={() => onRemove(c.id)} style={{ background: "none", border: "none", color: "var(--text3)", cursor: "pointer", fontSize: 18, padding: "4px", flexShrink: 0, lineHeight: 1 }}>×</button>
            </div>
          ))}
        </div>
        {/* Email capture */}
        <div style={{ padding: "20px 28px", borderTop: "1px solid var(--border)", background: "var(--bg3)" }}>
          {!submitted ? (
            <>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>Get your shortlist emailed to you</div>
              <div style={{ fontSize: 12, color: "var(--text3)", marginBottom: 12 }}>We'll also send ATAR updates and application deadlines for your saved courses.</div>
              <div style={{ display: "flex", gap: 8 }}>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com"
                  style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: "1px solid var(--border)", background: "var(--bg2)", color: "var(--text)", fontSize: 13, outline: "none" }}
                  onFocus={e => e.target.style.borderColor = "var(--accent)"}
                  onBlur={e => e.target.style.borderColor = "var(--border)"}
                  onKeyDown={e => e.key === "Enter" && email && setSubmitted(true)}
                />
                <button onClick={() => email && setSubmitted(true)}
                  style={{ padding: "10px 16px", borderRadius: 8, background: "var(--accent)", color: "var(--accent-fg)", border: "none", fontWeight: 600, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>
                  Send →
                </button>
              </div>
              <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 8 }}>No spam. Unsubscribe anytime. Universities may reach out with relevant offers.</div>
            </>

            <div style={{ textAlign: "center", padding: "8px 0", animation: "scaleIn 0.3s ease" }}>
              <div style={{ fontSize: 24, marginBottom: 8 }}>🎉</div>
              <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>Shortlist sent!</div>
              <div style={{ fontSize: 13, color: "var(--text3)" }}>Check your inbox at {email}</div>
            </div>
          )}
        </div>
      </div>
    </>

}

// ─── Main App ────────────────────────────────────────────────────────────────
function App() {
  const savedTweaks = (() => { try { return JSON.parse(localStorage.getItem("courseteer_tweaks") || "null"); } catch { return null; } })();
  const [tweaks, setTweaksState] = useState({ ...TWEAK_DEFAULTS, ...savedTweaks });
  const [showTweaks, setShowTweaks] = useState(false);
  const [search, setSearch] = useState("");
  const [selArea, setSelArea] = useState("");
  const [selUni, setSelUni] = useState("");
  const [selDur, setSelDur] = useState("");
  const [atarMin, setAtarMin] = useState("");
  const [selected, setSelected] = useState(null);
  const [shortlist, setShortlist] = useState(() => { try { return JSON.parse(localStorage.getItem("courseteer_shortlist") || "[]"); } catch { return []; } });
  const [showShortlist, setShowShortlist] = useState(false);
  const [heroVisible, setHeroVisible] = useState(false);
  const [listKey, setListKey] = useState(0);

  const saveShortlist = (items) => {
    setShortlist(items);
    localStorage.setItem("courseteer_shortlist", JSON.stringify(items));
  };
  const toggleShortlist = (course) => {
    const exists = shortlist.find(c => c.id === course.id);
    saveShortlist(exists ? shortlist.filter(c => c.id !== course.id) : [...shortlist, course]);
  };
  const setTweaks = (updates) => {
    const next = { ...tweaks, ...updates };
    setTweaksState(next);
    localStorage.setItem("courseteer_tweaks", JSON.stringify(next));
    window.parent?.postMessage({ type: "__edit_mode_set_keys", edits: updates }, "*");
  };

  // Tweaks host integration
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  useEffect(() => { setTimeout(() => setHeroVisible(true), 50); }, []);

  const filtered = useMemo(() => {
    const results = COURSES.filter(c => {
      if (search && !c.name.toLowerCase().includes(search.toLowerCase()) && !c.uniName.toLowerCase().includes(search.toLowerCase()) && !c.area.toLowerCase().includes(search.toLowerCase())) return false;
      if (selArea && c.area !== selArea) return false;
      if (selUni && c.uni !== selUni) return false;
      if (selDur && c.dur !== parseInt(selDur)) return false;
      if (atarMin && (c.atar == null || c.atar < parseInt(atarMin))) return false;
      return true;
    });
    // Sponsored courses float to top
    return [...results.filter(c => c.sponsored), ...results.filter(c => !c.sponsored)];
  }, [search, selArea, selUni, selDur, atarMin]);

  const handleFilter = useCallback((fn) => { fn(); setListKey(k => k + 1); }, []);

  const isDark = tweaks.theme === "dark";
  const layout = tweaks.layout;

  const activeFilters = [selArea, selUni, selDur, atarMin ? `ATAR ≥ ${atarMin}` : ""].filter(Boolean);

  return (
    <div className={isDark ? "theme-dark" : "theme-light"} style={{ minHeight: "100vh", background: "var(--bg)", color: "var(--text)", transition: "background 0.3s, color 0.3s" }}>
      {/* Header */}
      <header style={{
        position: "sticky", top: 0, zIndex: 50,
        background: isDark ? "oklch(10% 0.012 270 / 0.85)" : "oklch(98% 0.006 90 / 0.85)",
        backdropFilter: "blur(20px)",
        borderBottom: "1px solid var(--border)",
        transition: "all 0.3s",
      }}>
        <div style={{ maxWidth: 1280, margin: "0 auto", padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 30, height: 30, borderRadius: 8, background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6" stroke="var(--accent-fg)" strokeWidth="2"/>
                <path d="M8 4v4l3 2" stroke="var(--accent-fg)" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </div>
            <span style={{ fontFamily: "'Manrope', sans-serif", fontSize: 20, letterSpacing: "-0.01em" }}>The Courseteer</span>
          </div>
          <nav style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 13, color: "var(--accent)", fontWeight: 600, padding: "6px 14px", background: "var(--accent-soft)", borderRadius: 8 }}>Courses</span>
            <button onClick={() => setShowShortlist(true)} style={{
              background: shortlist.length > 0 ? "var(--accent-soft)" : "var(--bg3)",
              border: `1px solid ${shortlist.length > 0 ? "var(--accent)" : "var(--border)"}`,
              borderRadius: 8, height: 36, padding: "0 12px", cursor: "pointer",
              display: "flex", alignItems: "center", gap: 6,

              <span>📋</span>
              <span>Shortlist</span>
              {shortlist.length > 0 && (
                <span style={{ background: "var(--accent)", color: "var(--accent-fg)", borderRadius: 99, width: 18, height: 18, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700 }}>{shortlist.length}</span>
              )}
            </button>
            <button onClick={() => setTweaks({ theme: isDark ? "light" : "dark" })} style={{
              background: "var(--bg3)", border: "1px solid var(--border)",

      <div style={{

            <div style={{ marginTop: 16, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontSize: 12, color: "var(--text3)" }}>Filtering by:</span>
              {activeFilters.map(f => (
                <span key={f} style={{
                  padding: "4px 10px", borderRadius: 99,
                  background: "var(--accent)", color: "var(--accent-fg)",
                  fontSize: 12, fontWeight: 600, animation: "scaleIn 0.2s ease",
                }}>{f}</span>
              ))}
              <button onClick={() => { handleFilter(() => { setSelArea(""); setSelUni(""); setSelDur(""); setAtarMin(""); setSearch(""); }); }}
                style={{ fontSize: 12, color: "var(--text3)", background: "none", border: "none", cursor: "pointer", textDecoration: "underline", padding: "4px 6px" }}>
                Clear all
              </button>
            </div>
          )}
        </div>
      </div>

      <FeaturedUniBanner isDark={isDark} />

      {/* Layout toggle + result count */}
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "18px 24px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 13, color: "var(--text3)" }}>
          <span style={{ fontWeight: 700, color: "var(--text)" }}>{filtered.length}</span> course{filtered.length !== 1 ? "s" : ""} found
        </span>
        <div style={{ display: "flex", gap: 4, background: "var(--bg2)", padding: 4, borderRadius: 10, border: "1px solid var(--border)" }}>
          {[
            { id: "grid", icon: "⊞" },
            { id: "list", icon: "☰" },
            { id: "compact", icon: "≡" },
          ].map(l => (
            <button key={l.id} onClick={() => setTweaks({ layout: l.id })}
              style={{
                padding: "6px 12px", borderRadius: 7, border: "none", cursor: "pointer",
                background: layout === l.id ? "var(--accent)" : "transparent",
                color: layout === l.id ? "var(--accent-fg)" : "var(--text3)",
                fontSize: 14, transition: "all 0.2s", fontWeight: 600,
              }}>{l.icon}</button>
          ))}
        </div>
      </div>

      {/* Course listing */}
      <main style={{ maxWidth: 1280, margin: "0 auto", padding: "20px 24px 80px" }} key={listKey}>
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "80px 0", color: "var(--text3)" }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>🔍</div>
            <div style={{ fontSize: 18, fontFamily: "'Manrope', sans-serif", marginBottom: 8 }}>No courses found</div>
            <div style={{ fontSize: 14 }}>Try adjusting your filters</div>
          </div>
        )}

        {layout === "grid" && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16 }}>
            {filtered.map((c, i) => <CourseCard key={c.id} course={c} onClick={setSelected} idx={i} shortlisted={shortlist.some(s => s.id === c.id)} onShortlist={toggleShortlist} />)}
          </div>
        )}

        {layout === "list" && (
          <div style={{ background: "var(--card-bg)", border: "1px solid var(--border)", borderRadius: 16, overflow: "hidden" }}>
            {filtered.map((c, i) => <CourseRow key={c.id} course={c} onClick={setSelected} idx={i} shortlisted={shortlist.some(s => s.id === c.id)} onShortlist={toggleShortlist} />)}
          </div>
        )}

        {layout === "compact" && (
          <div style={{ background: "var(--card-bg)", border: "1px solid var(--border)", borderRadius: 16, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: "var(--bg2)", borderBottom: "2px solid var(--border)" }}>
                  {["Course", "University", "Field", "ATAR", "Campus", "Dur"].map(h => (
                    <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", whiteSpace: "nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((c, i) => <CourseTableRow key={c.id} course={c} onClick={setSelected} idx={i} />)}
              </tbody>
            </table>
          </div>
        )}
      </main>

      {/* Detail Panel */}
      {selected && <DetailPanel course={selected} onClose={() => setSelected(null)} shortlisted={shortlist.some(s => s.id === selected.id)} onShortlist={toggleShortlist} />}
      {showShortlist && <ShortlistDrawer items={shortlist} onRemove={id => saveShortlist(shortlist.filter(c => c.id !== id))} onClose={() => setShowShortlist(false)} />}}

      {/* Tweaks Panel */}
      {showTweaks && (
        <div style={{
          position: "fixed", bottom: 24, right: 24, zIndex: 200,
          background: "var(--bg2)", border: "1px solid var(--border)",
          borderRadius: 16, padding: "20px 22px", width: 260,
          boxShadow: "var(--shadow-lg)", animation: "scaleIn 0.2s ease",
        }}>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 16, color: "var(--text)", letterSpacing: "0.04em", textTransform: "uppercase" }}>Tweaks</div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>Theme</div>
            <div style={{ display: "flex", gap: 8 }}>
              {["dark", "light"].map(t => (
                <button key={t} onClick={() => setTweaks({ theme: t })}
                  style={{
                    flex: 1, padding: "8px", borderRadius: 8, border: `1px solid ${tweaks.theme === t ? "var(--accent)" : "var(--border)"}`,
                    background: tweaks.theme === t ? "var(--accent-soft)" : "transparent",
                    color: tweaks.theme === t ? "var(--accent)" : "var(--text2)",
                    fontSize: 13, cursor: "pointer", fontWeight: 600, transition: "all 0.2s", textTransform: "capitalize",
                  }}>{t}</button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 8, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>Layout</div>
            <div style={{ display: "flex", gap: 8, flexDirection: "column" }}>
              {[["grid", "⊞ Card Grid"], ["list", "☰ List View"], ["compact", "≡ Compact Table"]].map(([id, label]) => (
                <button key={id} onClick={() => setTweaks({ layout: id })}
                  style={{
                    padding: "8px 12px", borderRadius: 8, border: `1px solid ${tweaks.layout === id ? "var(--accent)" : "var(--border)"}`,
                    background: tweaks.layout === id ? "var(--accent-soft)" : "transparent",
                    color: tweaks.layout === id ? "var(--accent)" : "var(--text2)",
                    fontSize: 13, cursor: "pointer", fontWeight: 600, textAlign: "left", transition: "all 0.2s",
                  }}>{label}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
